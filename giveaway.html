<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Broxy Spin</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  text-align: center;
  font-family: Arial;
  background: #f5f5f5;
  overflow-x: hidden;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 10px;
}

#menuBtn {
  position: fixed;
  top: 12px;
  right: 15px;
  font-size: 24px;
  cursor: pointer;
  z-index: 2000;
}

#menu {
  position: fixed;
  top: 45px;
  right: 15px;
  background: white;
  border-radius: 10px;
  display: none;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  z-index: 2000;
}

#menu div { padding: 10px 16px; font-size: 14px; cursor: pointer; }

#wheelBox {
  position: relative;
  width: 90vw;
  max-width: 300px;
  margin: 20px auto;
}

.pointer {
  position: absolute;
  left: 50%;
  top: -8px;
  transform: translateX(-50%);
  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
  border-top: 28px solid black;
  z-index: 1000;
}

canvas {
  width: 100%;
  border-radius: 50%;
  border: 8px solid white;
}

button {
  padding: 10px 30px;
  margin-top: 10px;
  font-size: 14px;
}

h2 { font-size: 20px; margin-top: 10px; }

#spinCount { font-size: 14px; margin-top: 6px; }
#result { font-size: 14px; margin-top: 8px; }

.popup {
  position: fixed;
  bottom: -100px;
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  color: white;
  padding: 10px 18px;
  border-radius: 20px;
  transition: 0.4s;
  z-index: 3000;
}

.popup.show { bottom: 20px; }

.leaderboard-box {
  margin-top: 20px;
  padding: 14px;
  border-radius: 14px;
  background: #fff;
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.leaderboard-title {
  font-size: 15px;
  font-weight: bold;
}

.leaderboard-empty {
  font-size: 13px;
  color: #777;
  margin-top: 6px;
}

.about-box {
  margin-top: 25px;
  padding: 16px;
  border-radius: 14px;
  background: #ffffff;
  box-shadow: 0 8px 25px rgba(0,0,0,0.1);
  text-align: left;
}

.about-box h3 {
  font-size: 15px;
  margin-top: 10px;
  margin-bottom: 6px;
}

.about-box p {
  font-size: 13px;
  color: #444;
  line-height: 1.5;
}

.about-box ul {
  padding-left: 18px;
  font-size: 13px;
  color: #444;
}

.about-box li { margin-bottom: 5px; }

.about-box .note {
  margin-top: 10px;
  font-size: 12px;
  color: #888;
}

@media (min-width: 600px) {
  #wheelBox { max-width: 350px; }
}
</style>
</head>

<body>

<div class="container">

<div id="menuBtn">⋮</div>
<div id="menu">
  <div onclick="dailySpin()">🎁 Daily Spin</div>
  <div onclick="shareSpin()">📤 Share</div>
  <div onclick="watchAd()">📺 Ads</div>
</div>

<div id="popup" class="popup"><span id="popupText"></span></div>

<!-- 🔊 AUDIO ADDED HERE -->
<audio id="spinSound" src="assets/spin_loop.mp3" preload="auto"></audio>
<audio id="winSound" src="assets/win_fanfare.aac" preload="auto"></audio>

<h2>🎯 MLBB LUCKY SPIN</h2>
<p style="font-size:12px; color:#777;">Community rewards by Broxy 🎮</p>

<div id="wheelBox">
  <div class="pointer"></div>
  <canvas id="wheel" width="500" height="500"></canvas>
</div>

<button onclick="spin()">Spin</button>
<div id="spinCount"></div>
<div id="result"></div>

<div class="leaderboard-box">
  <div class="leaderboard-title">🏆 Winners</div>
  <div class="leaderboard-empty">No winners yet</div>
</div>

<div class="about-box">
  <h3>🎯 About Broxy Spin</h3>
  <p>Hey, I’m <b>Broxy</b> 👋 — creator of this platform.</p>
</div>

</div>

<script>
const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const spinSound = document.getElementById("spinSound");
const winSound = document.getElementById("winSound");

spinSound.loop = true;
spinSound.volume = 0.5;

const sections = ["Try Again","2💎","1💎","Try Again","CODE","1 Spin","Try Again","10💎"];
const colors = ["#f4d3d3","#d1e7dd","#cfe2f3","#fff3cd","#e2e3e5","#f8d7da","#e0fbfc","#ffefdb"];

const total = sections.length;
const arc = 2*Math.PI/total;

for(let i=0;i<total;i++){
  ctx.beginPath();
  ctx.fillStyle=colors[i];
  ctx.moveTo(250,250);
  ctx.arc(250,250,250,i*arc,(i+1)*arc);
  ctx.fill();

  ctx.save();
  ctx.translate(250,250);
  ctx.rotate(i*arc+arc/2);
  ctx.fillStyle="#000";
  ctx.textAlign="right";
  ctx.font="bold 14px Arial";
  ctx.fillText(sections[i],200,8);
  ctx.restore();
}

document.getElementById("menuBtn").onclick=()=>{
  const m=document.getElementById("menu");
  m.style.display=m.style.display==="block"?"none":"block";
};

function showPopup(msg){
  const p=document.getElementById("popup");
  document.getElementById("popupText").innerText=msg;
  p.classList.add("show");
  setTimeout(()=>p.classList.remove("show"),2000);
}

let spins,lastDaily;

if(localStorage.getItem("initialized")){
  spins=parseInt(localStorage.getItem("spins"));
  lastDaily=parseInt(localStorage.getItem("lastDaily"))||0;
}else{
  spins=2;
  lastDaily=0;
  localStorage.setItem("initialized","true");
  localStorage.setItem("spins",spins);
  localStorage.setItem("lastDaily",lastDaily);
}

function saveSpins(){
  localStorage.setItem("spins",spins);
  updateSpinUI();
}

function updateSpinUI(){
  document.getElementById("spinCount").innerText="Spins: "+spins;
}
updateSpinUI();

function spin(){
  if(spins<=0){ showPopup("No spins left!"); return; }

  spins--; saveSpins();

  // 🔊 START SMOOTH SOUND
  spinSound.currentTime = 0;
  spinSound.play();

  const rand=Math.random()*100;
  let winIdx;

  if(rand<0.05) winIdx=7;
  else if(rand<0.10) winIdx=2;
  else if(rand<0.15) winIdx=4;
  else{
    const common=[0,3,6];
    winIdx=common[Math.floor(Math.random()*common.length)];
  }

  const sliceDeg=360/total;
  const target=(winIdx*sliceDeg)+sliceDeg/2;
  const final=360-target-90;
  const rotate=360*6+final;

  canvas.style.transition="none";
  canvas.style.transform="rotate(0deg)";
  canvas.offsetHeight;

  canvas.style.transition="transform 5s cubic-bezier(0.25,1,0.5,1)";
  canvas.style.transform=`rotate(${rotate}deg)`;

  setTimeout(()=>{
    spinSound.pause(); // 🔊 STOP SOUND

    document.getElementById("result").innerText="You got: "+sections[winIdx];

    if([2,4,7].includes(winIdx)){
      winSound.play();
      confetti({particleCount:120,spread:80});
    }
  },5000);
}

function dailySpin(){
  const now=Date.now();
  if(now-lastDaily>86400000){
    spins++;
    lastDaily=now;
    localStorage.setItem("lastDaily",lastDaily);
    saveSpins();
    showPopup("+1 spin");
  }else showPopup("Already claimed");
}

function shareSpin(){
  if(!navigator.share){ showPopup("Not supported"); return; }
  navigator.share({title:"Broxy Spin",text:"Try your luck!",url:location.href})
  .then(()=>{ spins++; saveSpins(); showPopup("+1 spin"); });
}

function watchAd(){
  window.open("https://www.profitableratecpm.com/abc123","_blank");
  setTimeout(()=>{ spins++; saveSpins(); showPopup("+1 spin"); },4000);
}
</script>

</body>
</html>
